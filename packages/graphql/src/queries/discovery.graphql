# Discovery and Intention Certification Queries
# Used by: useDiscoveryScore, usePageDiscovery, useOnChainIntentionGroups

# Get user's intention/certification triples (with positions)
query UserIntentionTriples(
  $predicateLabels: [String!]!
  $userAddress: String!
  $limit: Int!
  $offset: Int!
) {
  triples(
    where: {
      predicate: { label: { _in: $predicateLabels } }
      positions: {
        account_id: { _ilike: $userAddress }
        shares: { _gt: "0" }
      }
    }
    limit: $limit
    offset: $offset
  ) {
    term_id
    predicate {
      label
    }
    object {
      term_id
      label
    }
    positions(where: {
      account_id: { _ilike: $userAddress }
      shares: { _gt: "0" }
    }) {
      account_id
      created_at
      shares
    }
  }
}

# Get ALL intention triples with positions for rank calculation
query AllIntentionTriples(
  $predicateLabels: [String!]!
  $limit: Int!
  $offset: Int!
) {
  triples(
    where: {
      predicate: { label: { _in: $predicateLabels } }
      positions: { shares: { _gt: "0" } }
    }
    limit: $limit
    offset: $offset
  ) {
    term_id
    predicate {
      label
    }
    object {
      term_id
    }
    positions(
      where: { shares: { _gt: "0" } }
      order_by: { created_at: asc }
    ) {
      account_id
      created_at
    }
  }
}

# Get positions for specific objects — used by useUserDiscoveryScore
# to fetch rank data only for pages the target user has certified
query TriplePositionsByObjects(
  $predicateLabels: [String!]!
  $objectTermIds: [String!]!
  $limit: Int!
  $offset: Int!
) {
  triples(
    where: {
      predicate: { label: { _in: $predicateLabels } }
      object: { term_id: { _in: $objectTermIds } }
      positions: { shares: { _gt: "0" } }
    }
    limit: $limit
    offset: $offset
  ) {
    term_id
    object {
      term_id
    }
    positions(
      limit: 1000
      where: { shares: { _gt: "0" } }
      order_by: { created_at: asc }
    ) {
      account_id
      created_at
    }
  }
}

# Get certification triples for a page (by hostname)
query CertificationTriples(
  $predicateIds: [String!]!
  $hostnameLike: String!
) {
  triples(
    where: {
      predicate_id: { _in: $predicateIds }
      _or: [
        { object: { label: { _ilike: $hostnameLike } } }
        { object: { value: { thing: { url: { _ilike: $hostnameLike } } } } }
      ]
      positions: { shares: { _gt: "0" } }
    }
    limit: 100
  ) {
    term_id
    predicate {
      term_id
      label
    }
    object {
      term_id
      label
    }
    positions(where: { shares: { _gt: "0" } }) {
      account_id
      shares
      created_at
    }
  }
}

# Get intention stats for a page
query IntentionStats(
  $predicateIds: [String!]!
  $hostnameLike: String!
) {
  triples(
    where: {
      predicate_id: { _in: $predicateIds }
      _or: [
        { object: { label: { _ilike: $hostnameLike } } }
        { object: { value: { thing: { url: { _ilike: $hostnameLike } } } } }
      ]
      positions: { shares: { _gt: "0" } }
    }
    limit: 100
  ) {
    term_id
    predicate_id
    predicate {
      label
    }
    object {
      term_id
    }
    positions(where: { shares: { _gt: "0" } }) {
      account_id
    }
  }
}

# Get user's intention positions on groups
query GetUserIntentionPositions(
  $predicateIds: [String!]!
  $userAddress: String!
) {
  triples(
    where: {
      predicate_id: { _in: $predicateIds }
      positions: {
        account_id: { _ilike: $userAddress }
        shares: { _gt: "0" }
      }
    }
    limit: 1000
  ) {
    term_id
    predicate {
      term_id
      label
    }
    object {
      term_id
      label
      value {
        thing {
          url
        }
      }
    }
    positions(where: {
      account_id: { _ilike: $userAddress }
      shares: { _gt: "0" }
    }) {
      account_id
      shares
      created_at
    }
    term {
      vaults {
        curve_id
        total_shares
        position_count
      }
    }
  }
}

# Unified certification data for a page (replaces CertificationTriples + IntentionStats + TrustDistrustByPage)
# Used by: usePageBlockchainData — fetches ALL certification types for a hostname in one shot
query PageCertificationData(
  $predicateIds: [String!]!
  $hostnameLike: String!
) {
  triples(
    where: {
      predicate_id: { _in: $predicateIds }
      _or: [
        { object: { label: { _ilike: $hostnameLike } } }
        { object: { value: { thing: { url: { _ilike: $hostnameLike } } } } }
      ]
      positions: { shares: { _gt: "0" } }
    }
    limit: 200
  ) {
    term_id
    predicate_id
    predicate {
      term_id
      label
    }
    object {
      term_id
      label
      value {
        thing {
          url
        }
      }
    }
    positions(where: { shares: { _gt: "0" } }) {
      account_id
      shares
      created_at
    }
  }
}

# Get all user certifications (trust, distrust, intentions)
# Uses _or: predicate_id (precise, mainnet) + label fallback (testnet, dynamic IDs)
query UserAllCertifications(
  $predicateIds: [String!]!
  $predicateLabels: [String!]!
  $userAddress: String!
  $limit: Int!
  $offset: Int!
) {
  triples(
    where: {
      _or: [
        { predicate_id: { _in: $predicateIds } }
        { predicate: { label: { _in: $predicateLabels } } }
      ]
      positions: {
        account_id: { _ilike: $userAddress }
        shares: { _gt: "0" }
      }
    }
    limit: $limit
    offset: $offset
    order_by: { created_at: desc }
  ) {
    term_id
    created_at
    predicate {
      term_id
      label
    }
    object {
      term_id
      label
      value {
        thing {
          url
        }
      }
    }
    positions(where: {
      account_id: { _ilike: $userAddress }
      shares: { _gt: "0" }
    }) {
      account_id
      shares
      created_at
    }
  }
}
