# Global Stake: user position + vault stats for a specific term/curve
query GetGlobalStakePosition(
  $globalTermId: String!
  $curveId: numeric!
  $walletAddresses: [String!]!
) {
  vaults(
    where: { term_id: { _eq: $globalTermId }, curve_id: { _eq: $curveId } }
  ) {
    current_share_price
    total_shares
    total_assets
    position_count
    positions(where: { account_id: { _in: $walletAddresses } }) {
      shares
      total_deposit_assets_after_total_fees
      total_redeem_assets_for_receiver
    }
  }
}
