# Debate Tab queries — fetch curated claims and featured lists by their term_ids

query GetClaimsByTermIds($termIds: [String!]!, $address: String) {
  triples(where: { term_id: { _in: $termIds } }) {
    term_id
    counter_term_id
    created_at
    subject {
      term_id
      label
      image
      cached_image {
        url
      }
      value {
        thing { image url }
        person { image }
        organization { image }
      }
    }
    predicate {
      term_id
      label
    }
    object {
      term_id
      label
      image
      cached_image {
        url
      }
      value {
        thing { image url }
        person { image }
        organization { image }
      }
    }
    term {
      vaults {
        market_cap
        total_shares
        position_count
        current_share_price
        positions(where: { account_id: { _ilike: $address } }) {
          shares
          total_deposit_assets_after_total_fees
          account {
            id
          }
        }
      }
    }
    counter_term {
      vaults {
        market_cap
        total_shares
        position_count
        current_share_price
        positions(where: { account_id: { _ilike: $address } }) {
          shares
          total_deposit_assets_after_total_fees
          account {
            id
          }
        }
      }
    }
  }
}

query GetFeaturedListsByObjectIds($objectIds: [String!]!) {
  predicate_objects(
    where: { object: { term_id: { _in: $objectIds } } }
    order_by: [{ total_market_cap: desc }]
  ) {
    triple_count
    total_market_cap
    total_position_count
    object {
      term_id
      label
      image
      cached_image {
        url
      }
      value {
        thing { image url }
        person { image }
        organization { image }
      }
    }
    triples(
      limit: 5
      order_by: [{ triple_term: { total_market_cap: desc } }]
    ) {
      subject {
        term_id
        label
        image
        cached_image {
          url
        }
        value {
          thing { image url }
          person { image }
          organization { image }
        }
      }
    }
  }
}

query GetListEntries($predicateId: String!, $objectId: String!, $address: String) {
