version: '3.8'
services:
  sofia:
    image: maximesaintjoannis/sofia-mastra:v1.2.6
    container_name: sofia
    environment:
      # GaiaNet configuration
      - GAIANET_NODE_URL=${GAIANET_NODE_URL}
      - GAIANET_MODEL=${GAIANET_MODEL}
      - GAIANET_TEXT_MODEL_SMALL=${GAIANET_TEXT_MODEL_SMALL}
      - GAIANET_TEXT_MODEL_LARGE=${GAIANET_TEXT_MODEL_LARGE}
      - GAIANET_EMBEDDING_MODEL=${GAIANET_EMBEDDING_MODEL}
      - GAIANET_EMBEDDING_URL=${GAIANET_EMBEDDING_URL}
      - USE_EMBEDDINGS=${USE_EMBEDDINGS:-true}

      # Database (LibSQL file for persistence on DStack encrypted volume)
      - DATABASE_URL=file:/dstack/data/mastra.db

      # MCP Server (internal - runs in same container)
      - MCP_SERVER_URL=http://127.0.0.1:3001/sse

      # Server configuration
      - NODE_ENV=${NODE_ENV:-production}

      # Human Attestor Bot (Proof of Human)
      - BOT_PRIVATE_KEY=${BOT_PRIVATE_KEY}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
    ports:
      - '4111:4111'
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4111/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
